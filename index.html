<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNote - Connexion</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #6366f1; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        input { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #6366f1; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        
        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn-google img { width: 18px; }

        #error-msg { color: #f87171; font-size: 0.8rem; margin-top: 10px; min-height: 1rem; }
        .divider { margin: 20px 0; border-bottom: 1px solid #333; position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #1e1e1e; padding: 0 10px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>WebNote</h2>
    
    <div class="input-group">
        <label>Email ou Pseudo</label>
        <input type="email" id="email" placeholder="ton@email.com">
    </div>
    <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" onclick="loginEmail()">Se connecter / S'inscrire</button>
    
    <div class="divider"><span>OU</span></div>

    <button class="btn btn-google" onclick="loginGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
        Continuer avec Google
    </button>

    <p id="error-msg"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        GoogleAuthProvider, 
        signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
        authDomain: "webnote-9ea1e.firebaseapp.com",
        projectId: "webnote-9ea1e",
        storageBucket: "webnote-9ea1e.firebasestorage.app",
        messagingSenderId: "869875049003",
        appId: "1:869875049003:web:0f7334733cb313e426406e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    const errorDiv = document.getElementById('error-msg');

    // 1. Connexion / Inscription par Email
    window.loginEmail = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return;

        try {
            // On tente la connexion
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "ngl.html";
        } catch (error) {
            // Si le compte n'existe pas, on le crée
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                    window.location.href = "ngl.html";
                } catch (e) {
                    errorDiv.textContent = "Erreur : " + e.message;
                }
            } else {
                errorDiv.textContent = "Erreur : " + error.message;
            }
        }
    };

    // 2. Connexion Google
    window.loginGoogle = async () => {
        try {
            await signInWithPopup(auth, googleProvider);
            window.location.href = "ngl.html";
        } catch (error) {
            errorDiv.textContent = "Erreur Google : " + error.message;
        }
    };
</script>

</body>
</html>
