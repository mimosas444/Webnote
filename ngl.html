<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNote - Mon Espace</title>
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        .nav-bar { display: flex; gap: 20px; padding: 15px 25px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .nav-bar a { color: #94a3b8; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-bar a:hover { color: var(--primary); }
        .nav-bar .active { color: white; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }

        .container { padding: 25px; max-width: 500px; margin: 0 auto; }
        
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .card h3 { margin-top: 0; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .link-box { 
            background: #0f172a; padding: 15px; border-radius: 12px; color: var(--secondary); 
            font-family: monospace; font-size: 0.85rem; cursor: pointer; word-break: break-all; 
            margin-top: 15px; border: 1px solid #334155; transition: 0.2s; text-align: center;
        }
        .link-box:hover { border-color: var(--secondary); background: #1e293b; }

        .msg-item { 
            background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid #334155; 
            margin-bottom: 15px; position: relative; overflow: hidden; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-item::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--primary); }
        .msg-date { font-size: 0.7rem; color: #64748b; margin-bottom: 8px; }
        .msg-text { font-size: 1rem; line-height: 1.5; color: #f1f5f9; }
        
        #auth-status { text-align: center; font-size: 0.8rem; color: #4ade80; margin-bottom: 15px; font-weight: 600; }
        .loading-text { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">Accueil</a>
    <a href="ngl.html" class="active">Espace Privé</a>
    <a href="dashboard.html">Groupe</a>
</nav>

<div class="container">
    <div id="auth-status">Initialisation...</div>

    <div class="card">
        <h3>Ton lien WebNote 🔗</h3>
        <p style="font-size: 0.85rem; color: #94a3b8;">Partage ce lien en bio ou en story pour recevoir des messages.</p>
        <div class="link-box" id="shareLink" onclick="copyLink()">
            <span class="loading-text">Génération en cours...</span>
        </div>
    </div>

    <h3 style="display: flex; justify-content: space-between; align-items: center;">
        Boîte de réception <span id="msgCount" style="background: var(--primary); font-size: 0.8rem; padding: 2px 12px; border-radius: 20px;">0</span>
    </h3>
    
    <div id="list">
        <p style="text-align: center; color: #475569; margin-top: 50px;">Aucun message pour le moment.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIGURATION RÉELLE DE TON PROJET (Screenshot_20260403)
    const firebaseConfig = {
      apiKey: "AIzaSyE6doCIM_IU-JnsTRYRaebberZpJpG9EtY",
      authDomain: "testeur-1e462.firebaseapp.com",
      projectId: "testeur-1e462",
      storageBucket: "testeur-1e462.firebasestorage.app",
      messagingSenderId: "67608194276",
      appId: "1:67608194276:web:9ed96e88dff245fdc22671",
      measurementId: "G-QD42L254N2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. GESTION DE LA CONNEXION
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            document.getElementById('auth-status').textContent = "Connexion anonyme...";
            try {
                await signInAnonymously(auth);
            } catch (e) {
                document.getElementById('auth-status').textContent = "Erreur d'accès ❌";
                console.error(e);
            }
        } else {
            document.getElementById('auth-status').textContent = "● Profil Actif (ID: " + user.uid.substring(0,6) + ")";
            setupUserProfile(user);
        }
    });

    // 2. CRÉATION DU PROFIL ET DU LIEN
    async function setupUserProfile(user) {
        try {
            // Force l'écriture dans la collection 'users'
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: "Utilisateur_" + user.uid.substring(0,4),
                lastActive: serverTimestamp()
            }, { merge: true });

            // Génération du lien de partage correct
            const currentPath = window.location.pathname;
            const directory = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            const finalLink = window.location.origin + directory + "send.html?u=" + user.uid;
            
            document.getElementById('shareLink').textContent = finalLink;

            // Charger les messages
            loadMessages(user.uid);
        } catch (e) { 
            console.error(e);
            document.getElementById('shareLink').innerHTML = "<span style='color:#f87171'>Erreur Firestore : Vérifie tes règles !</span>";
        }
    }

    // 3. CHARGEMENT DES MESSAGES EN TEMPS RÉEL
    function loadMessages(uid) {
        const q = query(collection(db, "nglMsgs", uid, "msgs"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('list');
            document.getElementById('msgCount').textContent = snapshot.size;
            
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align: center; color: #475569; margin-top: 50px;">Partage ton lien pour recevoir des messages ! 📢</p>';
                return;
            }

            listDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleString('fr-FR', {
                    hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
                }) : "À l'instant";

                const div = document.createElement('div');
                div.className = 'msg-item';
                div.innerHTML = `
                    <div class="msg-date">${date}</div>
                    <div class="msg-text">${data.message}</div>
                `;
                listDiv.appendChild(div);
            });
        });
    }

    // 4. FONCTION COPIER
    window.copyLink = () => {
        const link = document.getElementById('shareLink').textContent;
        if (link.includes("...")) return;
        
        navigator.clipboard.writeText(link).then(() => {
            alert("Lien copié ! Colle-le dans ta bio Instagram.");
        }).catch(() => {
            alert("Lien : " + link); // Fallback si clipboard échoue
        });
    };
</script>
</body>
</html>
