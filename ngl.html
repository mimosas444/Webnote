<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNote - Mon Espace Privé</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; }
        .nav-bar { display: flex; gap: 20px; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .nav-bar a { color: #bbb; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .nav-bar a:hover { color: #6366f1; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .link-box { 
            background: #252525; padding: 12px; border-radius: 8px; color: #ec4899; 
            font-weight: bold; cursor: pointer; word-break: break-all; margin-top: 10px; border: 1px dashed #444;
        }
        .msg-item { 
            background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            margin-bottom: 12px; border-left: 5px solid #6366f1; 
        }
        .msg-date { font-size: 0.75rem; color: #666; margin-bottom: 5px; }
        .msg-text { font-size: 1rem; color: #eee; }
        .status-msg { text-align: center; color: #6366f1; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">Accueil</a>
    <a href="ngl.html" style="color: #6366f1;">Espace Privé</a>
    <a href="dashboard.html">Groupe</a>
</nav>

<div class="container">
    <div id="auth-status" class="status-msg">Connexion à WebNote...</div>

    <div class="card">
        <h3>Ton lien de messages 🔗</h3>
        <div class="link-box" id="shareLink" onclick="copyLink()">Génération du lien...</div>
        <p style="font-size: 0.8rem; color: #555; margin-top: 10px;">Clique sur le lien pour le copier.</p>
    </div>

    <h3>Tes Messages (<span id="msgCount">0</span>)</h3>
    <div id="list">
        <p style="text-align: center; color: #444;">Aucun message pour le moment.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
        authDomain: "webnote-9ea1e.firebaseapp.com",
        projectId: "webnote-9ea1e",
        storageBucket: "webnote-9ea1e.firebasestorage.app",
        messagingSenderId: "869875049003",
        appId: "1:869875049003:web:0f7334733cb313e426406e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // MODIFICATION : Forcer la connexion anonyme au chargement
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            try {
                await signInAnonymously(auth);
            } catch (e) {
                document.getElementById('auth-status').textContent = "Erreur d'authentification ❌";
            }
        } else {
            document.getElementById('auth-status').textContent = "Connecté en tant que " + user.uid.substring(0,6);
            setupUserProfile(user);
        }
    });

    async function setupUserProfile(user) {
        // Force la création du document dans 'users'
        try {
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: "Utilisateur_" + user.uid.substring(0,4),
                lastActive: serverTimestamp()
            }, { merge: true });

            // Génération du lien
            const link = window.location.origin + window.location.pathname.replace('ngl.html', 'send.html') + "?u=" + user.uid;
            document.getElementById('shareLink').textContent = link;

            // Charger les messages
            loadMessages(user.uid);
        } catch (e) {
            console.error(e);
        }
    }

    function loadMessages(uid) {
        const q = query(collection(db, "nglMsgs", uid, "msgs"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('list');
            document.getElementById('msgCount').textContent = snapshot.size;
            
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align: center; color: #444;">Partage ton lien pour recevoir des messages !</p>';
                return;
            }

            listDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleString() : "À l'instant";
                const div = document.createElement('div');
                div.className = 'msg-item';
                div.innerHTML = `<div class="msg-date">${date}</div><div class="msg-text">${data.message}</div>`;
                listDiv.appendChild(div);
            });
        });
    }

    window.copyLink = () => {
        const text = document.getElementById('shareLink').textContent;
        navigator.clipboard.writeText(text).then(() => alert("Lien copié !"));
    };
</script>
</body>
</html>
