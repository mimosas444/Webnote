<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WebNote - Envoyer un message</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; }
        .nav-bar { display: flex; gap: 20px; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .nav-bar a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .nav-bar a:hover { color: #6366f1; }
        .container { display: flex; justify-content: center; padding-top: 50px; }
        .send-card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; }
        textarea { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; resize: none; box-sizing: border-box; margin-bottom: 15px;}
        button { width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; cursor: not-allowed; }
        .dest { font-size: 0.9rem; color: #ec4899; margin-bottom: 15px; font-weight: bold; }
        #status { font-size: 0.8rem; margin-top: 15px; text-align: center; word-break: break-all; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="ngl.html">Espace Privé</a>
    <a href="dashboard.html">Groupe</a>
</nav>

<div class="container">
    <div class="send-card">
        <div class="dest" id="destName">Chargement du profil...</div>
        <textarea id="msgInput" rows="4" placeholder="Écrire un message anonyme..."></textarea>
        <button id="sendBtn" onclick="sendMsg()">Envoyer</button>
        <p id="status"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
        authDomain: "webnote-9ea1e.firebaseapp.com",
        projectId: "webnote-9ea1e",
        storageBucket: "webnote-9ea1e.firebasestorage.app",
        messagingSenderId: "869875049003",
        appId: "1:869875049003:web:0f7334733cb313e426406e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const recipientId = params.get('u');

    async function checkUser() {
        if (!recipientId) {
            document.getElementById('destName').textContent = "Erreur : Aucun identifiant fourni dans l'URL.";
            document.getElementById('sendBtn').disabled = true;
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", recipientId));
            if (userDoc.exists()) {
                document.getElementById('destName').textContent = "Destinataire : " + userDoc.data().name;
            } else {
                document.getElementById('destName').textContent = "Erreur : Utilisateur introuvable.";
                document.getElementById('sendBtn').disabled = true;
            }
        } catch (error) {
            document.getElementById('destName').textContent = "Erreur de connexion à la base de données.";
            console.error(error);
        }
    }

    window.sendMsg = async () => {
        const text = document.getElementById('msgInput').value.trim();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        if (!text) return;

        btn.disabled = true;
        status.style.color = "#fff";
        status.textContent = "Envoi en cours...";

        try {
            await addDoc(collection(db, "nglMsgs", recipientId, "msgs"), {
                message: text,
                createdAt: serverTimestamp(),
                read: false,
                mood: 'Standard'
            });

            status.style.color = "#4ade80";
            status.textContent = "Message envoyé avec succès.";
            document.getElementById('msgInput').value = "";
        } catch (e) {
            console.error(e);
            status.style.color = "#f87171";
            // Affichage de l'erreur exacte pour faciliter le débogage
            status.textContent = "Échec de l'envoi : " + e.message;
            btn.disabled = false;
        }
    };

    checkUser();
</script>

</body>
</html>
