<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNote - Envoyer un message anonyme</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; }
        
        /* Barre de Navigation */
        .nav-bar { display: flex; gap: 20px; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; align-items: center; }
        .nav-bar a { color: #bbb; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: 0.3s; }
        .nav-bar a:hover { color: #6366f1; }
        .nav-bar .active { color: #fff; border-bottom: 2px solid #6366f1; padding-bottom: 5px; }

        .container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
        
        .send-card { background: #1e1e1e; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dest-info { margin-bottom: 20px; text-align: center; }
        .dest-info h2 { margin: 0; color: #ec4899; font-size: 1.2rem; }
        .dest-info p { color: #888; font-size: 0.85rem; margin-top: 5px; }

        textarea { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; resize: none; box-sizing: border-box; font-size: 1rem; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: #6366f1; }

        button { width: 100%; background: #6366f1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; min-height: 1.2rem; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html">Accueil</a>
    <a href="ngl.html">Espace Privé</a>
    <a href="dashboard.html">Groupe</a> </nav>

<div class="container">
    <div class="send-card">
        <div class="dest-info">
            <h2 id="destName">Vérification...</h2>
            <p>Ton message sera 100% anonyme</p>
        </div>

        <textarea id="msgInput" rows="5" placeholder="Qu'as-tu sur le cœur ?"></textarea>
        
        <button id="sendBtn" onclick="sendMsg()">Envoyer le message</button>
        
        <div id="status"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
        authDomain: "webnote-9ea1e.firebaseapp.com",
        projectId: "webnote-9ea1e",
        storageBucket: "webnote-9ea1e.firebasestorage.app",
        messagingSenderId: "869875049003",
        appId: "1:869875049003:web:0f7334733cb313e426406e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Récupération de l'ID utilisateur dans l'URL (?u=ID)
    const params = new URLSearchParams(window.location.search);
    const recipientId = params.get('u');

    // Vérifier si le destinataire existe
    async function checkUser() {
        if (!recipientId) {
            document.getElementById('destName').textContent = "Lien invalide ❌";
            document.getElementById('sendBtn').disabled = true;
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, "users", recipientId));
            if (userDoc.exists()) {
                document.getElementById('destName').textContent = "Envoyer à : " + userDoc.data().name;
            } else {
                document.getElementById('destName').textContent = "Profil introuvable 👤";
                document.getElementById('sendBtn').disabled = true;
            }
        } catch (e) {
            console.error(e);
            document.getElementById('destName').textContent = "Erreur de connexion";
        }
    }

    // Fonction d'envoi
    window.sendMsg = async () => {
        const text = document.getElementById('msgInput').value.trim();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        if (!text) return;

        btn.disabled = true;
        status.style.color = "#aaa";
        status.textContent = "Envoi en cours...";

        try {
            // Chemin : nglMsgs > ID_DESTINATAIRE > msgs > DOCUMENT_MESSAGE
            await addDoc(collection(db, "nglMsgs", recipientId, "msgs"), {
                message: text,
                createdAt: serverTimestamp(),
                read: false
            });

            status.style.color = "#4ade80";
            status.textContent = "Envoyé avec succès ! 🎉";
            document.getElementById('msgInput').value = "";
            
            // Réactivation après 3 secondes pour un autre message
            setTimeout(() => {
                btn.disabled = false;
                status.textContent = "";
            }, 3000);

        } catch (e) {
            console.error("Erreur Firestore :", e);
            status.style.color = "#f87171";
            status.textContent = "Erreur : " + e.message;
            btn.disabled = false;
        }
    };

    checkUser();
</script>

</body>
    </html>
