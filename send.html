<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNote - Envoyer un message</title>
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .send-card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #334155; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        
        .profile-badge { width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; border: 4px solid #0f172a; }
        
        h2 { margin: 10px 0; font-size: 1.2rem; color: #f1f5f9; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }

        textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; padding: 15px; box-sizing: border-box; resize: none; font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn-send { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-send:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-send:active { transform: translateY(0); }

        #status { margin-top: 15px; font-size: 0.85rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }

        .footer { margin-top: 25px; font-size: 0.75rem; color: #475569; }
    </style>
</head>
<body>

<div class="send-card">
    <div class="profile-badge" id="avatar">?</div>
    <h2 id="recipientName">Chargement...</h2>
    <p>Envoie-moi un message anonyme !</p>

    <textarea id="message" rows="4" placeholder="Écris quelque chose de sympa..."></textarea>
    
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Envoyer le WebNote</button>
    
    <div id="status"></div>

    <div class="footer">Propulsé par <b>WebNote</b></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // TA CONFIGURATION RÉELLE
    const firebaseConfig = {
      apiKey: "AIzaSyE6doCIM_IU-JnsTRYRaebberZpJpG9EtY",
      authDomain: "testeur-1e462.firebaseapp.com",
      projectId: "testeur-1e462",
      storageBucket: "testeur-1e462.firebasestorage.app",
      messagingSenderId: "67608194276",
      appId: "1:67608194276:web:9ed96e88dff245fdc22671",
      measurementId: "G-QD42L254N2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Récupérer l'ID utilisateur dans l'URL (?u=ID)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('u');
    const statusDiv = document.getElementById('status');

    if (!userId) {
        document.body.innerHTML = "<div style='color:white; text-align:center;'>Lien invalide. ❌</div>";
    } else {
        checkUser();
    }

    async function checkUser() {
        try {
            const userDoc = await getDoc(doc(db, "users", userId));
            if (userDoc.exists()) {
                const name = userDoc.data().name || "Quelqu'un";
                document.getElementById('recipientName').textContent = name;
                document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
            } else {
                document.getElementById('recipientName').textContent = "Utilisateur inconnu";
            }
        } catch (e) {
            console.error(e);
            statusDiv.innerHTML = "<span class='error'>Erreur de connexion au profil.</span>";
        }
    }

    window.sendMessage = async () => {
        const msgText = document.getElementById('message').value.trim();
        const btn = document.getElementById('sendBtn');

        if (!msgText) return;

        btn.disabled = true;
        btn.textContent = "Envoi...";

        try {
            await addDoc(collection(db, "nglMsgs", userId, "msgs"), {
                message: msgText,
                createdAt: serverTimestamp()
            });

            statusDiv.innerHTML = "<span class='success'>Message envoyé avec succès ! 🎉</span>";
            document.getElementById('message').value = "";
            btn.textContent = "Envoyé !";
        } catch (e) {
            console.error(e);
            statusDiv.innerHTML = "<span class='error'>Échec de l'envoi. Réessaie.</span>";
            btn.disabled = false;
            btn.textContent = "Réessayer";
        }
    };
</script>

</body>
</html>
