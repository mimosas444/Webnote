<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Envoyer un message anonyme</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .send-card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; }
        textarea { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; resize: none; box-sizing: border-box; }
        button { width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; cursor: not-allowed; }
        .dest { font-size: 0.9rem; color: #ec4899; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="send-card">
    <div class="dest" id="destName">Chargement du profil...</div>
    <textarea id="msgInput" rows="4" placeholder="Écris ton message anonyme ici..."></textarea>
    <button id="sendBtn" onclick="sendMsg()">Envoyer le message</button>
    <p id="status" style="font-size: 0.8rem; margin-top: 10px; text-align: center;"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
        authDomain: "webnote-9ea1e.firebaseapp.com",
        projectId: "webnote-9ea1e",
        storageBucket: "webnote-9ea1e.firebasestorage.app",
        messagingSenderId: "869875049003",
        appId: "1:869875049003:web:0f7334733cb313e426406e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Récupérer l'ID du destinataire dans l'URL (?u=ID)
    const params = new URLSearchParams(window.location.search);
    const recipientId = params.get('u');

    async function checkUser() {
        if (!recipientId) {
            document.getElementById('destName').textContent = "Lien invalide ❌";
            document.getElementById('sendBtn').disabled = true;
            return;
        }

        const userDoc = await getDoc(doc(db, "users", recipientId));
        if (userDoc.exists()) {
            document.getElementById('destName').textContent = "Envoyer à : " + userDoc.data().name;
        } else {
            document.getElementById('destName').textContent = "Utilisateur introuvable ❓";
            document.getElementById('sendBtn').disabled = true;
        }
    }

    // 2. Envoyer le message
    window.sendMsg = async () => {
        const text = document.getElementById('msgInput').value.trim();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        if (!text) return;

        btn.disabled = true;
        status.textContent = "Envoi en cours...";

        try {
            // On écrit dans la sous-collection du destinataire
            await addDoc(collection(db, "nglMsgs", recipientId, "msgs"), {
                message: text,
                createdAt: serverTimestamp(),
                read: false,
                mood: 'En direct'
            });

            status.style.color = "#4ade80";
            status.textContent = "Message envoyé avec succès ! 🎉";
            document.getElementById('msgInput').value = "";
        } catch (e) {
            console.error(e);
            status.style.color = "#f87171";
            status.textContent = "Erreur lors de l'envoi.";
            btn.disabled = false;
        }
    };

    checkUser();
</script>

</body>
</html>
