<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Message anonyme — WebNote</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
<style>
/* Style global et animations */
img.emoji{display:inline-block;vertical-align:-.18em;width:1.1em;height:1.1em;pointer-events:none}
:root{
  --bg:#05050e;--bg1:#0a0918;--bg2:#0f0e22;--bg3:#14132c;
  --p:#6366f1;--p2:#8b5cf6;--p3:#a78bfa;--p4:#c4b5fd;
  --pk:#ec4899;--ok:#10d9a0;--dn:#f87171;--warn:#f59e0b;
  --tx:#f0f0ff;--tx2:#8b87b8;--tx3:#3d3b5e;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);--bd3:rgba(255,255,255,.18);
  --mb:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  --ea:cubic-bezier(.23,1,.32,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 40px;position:relative;}
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%)}
.wrap{width:100%;max-width:390px;position:relative;z-index:2}

/* Views */
#loadView, #nfView, #successView { display:none; flex-direction:column; align-items:center; gap:16px; padding:50px 0; animation:fadeUp .5s var(--ea) both; text-align:center; }
#loadView { display: flex; }
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* Card & Form */
.brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:12px}
.brand-name{font-size:.92rem;font-weight:800;letter-spacing:-.4px;background:linear-gradient(135deg,#e8e8ff 30%,var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ow-card{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--bd2);border-radius:20px;padding:16px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px);margin-bottom:12px}
.ow-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:#fff;background:var(--mb);position:relative}
.ow-name{font-size:.94rem;font-weight:800;margin-bottom:3px}
.ow-desc{font-size:.7rem;color:var(--tx2)}
.form-glass{background:rgba(255,255,255,.03);border:1px solid var(--bd2);border-radius:22px;padding:18px;display:flex;flex-direction:column;gap:13px;backdrop-filter:blur(24px)}
.msg-ta{width:100%;background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:13px;color:var(--tx);font-family:inherit;font-size:.87rem;outline:none;resize:none;min-height:112px;transition:.2s}
.msg-ta:focus{border-color:var(--p)}
.em-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none}
.em{width:34px;height:34px;min-width:34px;border-radius:10px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer}
.mood-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{height:27px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-size:.7rem;color:var(--tx2);padding:0 10px;cursor:pointer}
.chip.on{background:rgba(99,102,241,.15);border-color:var(--p);color:var(--p3)}
.send-btn{width:100%;padding:15px;border-radius:15px;border:none;background:var(--mb);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;gap:9px}
.send-btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.sa{width:100%;padding:12px;border-radius:13px;border:none;font-weight:700;margin-top:8px;cursor:pointer}
.sa.again{background:var(--mb);color:#white}
.sa.join{background:rgba(255,255,255,0.05);color:var(--tx2);margin-top:10px}
</style>
</head>
<body>

<div class="bg-scene"><div class="grid-lines"></div></div>

<div class="wrap">
  <div id="loadView">
    <div class="ld-lbl">Chargement du profil...</div>
  </div>

  <div id="nfView">
    <h2>Lien invalide</h2>
    <p>Ce profil n'existe pas.</p>
    <a href="index.html" style="color:var(--p3); text-decoration:none; font-weight:700;">Créer mon WebNote</a>
  </div>

  <div id="formView" style="display:none;">
    <div class="brand"><span class="brand-name">WebNote</span></div>
    <div class="ow-card">
      <div class="ow-av" id="owInit">?</div>
      <div class="ow-info">
        <div class="ow-name" id="owName">...</div>
        <div class="ow-desc">attend ton message anonyme 👀</div>
      </div>
    </div>
    <div class="form-glass">
      <textarea class="msg-ta" id="msgTA" placeholder="Écris quelque chose d'anonyme..." maxlength="500"></textarea>
      <div class="em-scroll">
        <div class="em" onclick="ins('😍')">😍</div><div class="em" onclick="ins('🔥')">🔥</div>
        <div class="em" onclick="ins('😂')">😂</div><div class="em" onclick="ins('❤️')">❤️</div>
        <div class="em" onclick="ins('😭')">😭</div><div class="em" onclick="ins('💀')">💀</div>
      </div>
      <div class="mood-chips">
        <button class="chip on" onclick="setMood('Autre', this)">💬 Autre</button>
        <button class="chip" onclick="setMood('Confession', this)">🤫 Confession</button>
        <button class="chip" onclick="setMood('Question', this)">❓ Question</button>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <span id="btnTxt">Envoyer anonymement</span>
        <div class="btn-spin" id="btnSpin"></div>
      </button>
    </div>
  </div>

  <div id="successView">
    <h2 style="color:var(--ok)">Envoyé !</h2>
    <p id="succTxt">Ton message a bien été transmis.</p>
    <button class="sa again" onclick="location.reload()">Envoyer un autre</button>
    <button class="sa join" onclick="window.location.href='index.html'">Créer mon lien</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApC4T-WdDIFk3VuBGD_Zscz5X_lE6dFFs",
    authDomain: "webnote-9ea1e.firebaseapp.com",
    projectId: "webnote-9ea1e",
    storageBucket: "webnote-9ea1e.firebasestorage.app",
    messagingSenderId: "869875049003",
    appId: "1:869875049003:web:0f7334733cb313e426406e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  const uid = urlParams.get('u');
  let currentMood = "Autre";

  // Charger le profil
  async function init() {
    if(!uid) { showView('nfView'); return; }
    try {
      const snap = await getDoc(doc(db, "users", uid));
      if(snap.exists()) {
        const name = snap.data().displayName || "Quelqu'un";
        document.getElementById('owName').innerText = name;
        document.getElementById('owInit').innerText = name.charAt(0).toUpperCase();
        showView('formView');
      } else { showView('nfView'); }
    } catch(e) { showView('nfView'); }
  }

  window.sendMsg = async () => {
    const msg = document.getElementById('msgTA').value.trim();
    if(!msg) return;
    
    document.getElementById('btnTxt').style.display = 'none';
    document.getElementById('btnSpin').style.display = 'block';
    document.getElementById('sendBtn').disabled = true;

    try {
      await addDoc(collection(db, "nglMsgs", uid, "msgs"), {
        message: msg,
        mood: currentMood,
        createdAt: serverTimestamp(),
        read: false
      });
      showView('successView');
    } catch(e) {
      alert("Erreur. Vérifie tes règles Firestore.");
      document.getElementById('btnTxt').style.display = 'block';
      document.getElementById('btnSpin').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
    }
  };

  function showView(id) {
    ['loadView','nfView','formView','successView'].forEach(v => document.getElementById(v).style.display = 'none');
    document.getElementById(id).style.display = (id === 'formView') ? 'flex' : 'flex';
  }

  window.ins = (e) => { document.getElementById('msgTA').value += e; };
  window.setMood = (m, b) => { 
    currentMood = m; 
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    b.classList.add('on');
  };

  init();
</script>
</body>
</html>
